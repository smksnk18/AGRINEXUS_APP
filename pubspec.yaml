name: agrinexus
description: "AgriNexus - Connecting Farmers & Consumers. A premium agriculture marketplace app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shared_preferences: ^2.2.3
  animations: ^2.0.11
  http: ^1.6.0
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  firebase_app_check: ^0.4.0+1

  geolocator: ^11.0.0
  fl_chart: ^0.68.0
  intl: ^0.19.0

  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  barcode_scan2: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
